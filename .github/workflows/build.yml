name: Build TiviSync & ProjSync APKs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build debug APKs
        run: |
          cd android
          gradle assembleDebug

      - name: Upload TiviSync APK
        uses: actions/upload-artifact@v4
        with:
          name: TiviSync-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload ProjSync APK
        uses: actions/upload-artifact@v4
        with:
          name: ProjSync-debug
          path: android/projsync/build/outputs/apk/debug/projsync-debug.apk
          retention-days: 30
